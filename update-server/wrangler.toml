name = "ceru-update-server"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# 公开变量(可写在仓库里).
[vars]
GITHUB_REPO = "timeshiftsauce/CeruMusic"
RELEASE_CACHE_TTL = "60"

# 机密变量通过 wrangler secret 注入,不要写在这里:
#   wrangler secret put GITHUB_TOKEN

# 部署后绑定自定义域名:
#   wrangler deploy
#   然后在 Cloudflare 控制台 Workers > 你的 worker > Triggers > Custom Domains
#   添加 update.cerumusic.top (域名要在同一 CF 账户托管)

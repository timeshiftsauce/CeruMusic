name: Upload Build To Latest Release

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    name: build and upload to latest release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # macos-15-intel = Intel x64 runner (macos-13 已于 2025-12-04 下线), macos-latest = Apple Silicon arm64 runner
      matrix:
        os: [macos-15-intel, macos-latest]

    steps:
      - name: Check out git repository
        uses: actions/checkout@v5

      - name: Resolve target release tag
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')"
          RELEASE_NAME="$(gh api repos/${{ github.repository }}/releases/latest --jq '.name')"

          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "null" ]; then
            echo "未找到可上传的最新 Release"
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME:-$TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "目标 Release: ${RELEASE_NAME:-$TAG_NAME} ($TAG_NAME)"

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'yarn'

      - name: Cache Electron Binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-v1-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-v1-

      - name: Install Dependencies
        shell: bash
        run: |
          npm i -g yarn
          yarn install --frozen-lockfile

      - name: Build Electron App for macOS Intel (x64)
        if: matrix.os == 'macos-15-intel'
        shell: bash
        env:
          # macOS 代码签名 + 公证(Apple notarization)所需环境变量
          # CSC_LINK / CSC_KEY_PASSWORD 由 electron-builder 用于导入 Developer ID Application 证书
          # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID 由 notarytool 用于提交公证
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # CI 直连 GitHub 拉 electron-builder-binaries 更稳;npmmirror 未必同步 dmg-builder 新版二进制
          sed -i.bak '/electron_builder_binaries_mirror/d' .npmrc || true
          yarn run build:mac:intel

      - name: Build Electron App for macOS Apple Silicon (arm64)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i.bak '/electron_builder_binaries_mirror/d' .npmrc || true
          yarn run build:mac:arm64

      - name: Cleanup Artifacts for MacOS
        shell: bash
        run: |
          npx del-cli "dist/*" "!dist/(*.dmg|*.zip|latest*.yml)"

      - name: Upload build outputs to latest release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          shopt -s nullglob
          files=(dist/*)

          if [ ${#files[@]} -eq 0 ]; then
            echo "dist 目录没有可上传文件"
            exit 1
          fi

          echo "准备上传到 Release: $TAG_NAME"
          printf ' - %s\n' "${files[@]}"
          gh release upload "$TAG_NAME" "${files[@]}" --clobber --repo "${{ github.repository }}"

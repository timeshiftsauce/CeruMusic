name: AutoBuild # 工作流的名称

permissions:
  contents: write # 给予写入仓库内容的权限

on:
  push:
    tags:
      - 'v*' # 当推送以v开头的标签时触发
  workflow_dispatch: # 允许手动点击按钮触发构建

jobs:
  release:
    name: build and release electron app
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # 即使一个平台失败，其他平台继续运行
      matrix:
        # 定义运行环境：Windows, macOS, Linux
        # macos-15-intel = Intel x64 runner (macos-13 已于 2025-12-04 下线), macos-latest = Apple Silicon arm64 runner
        # 两台 mac runner 各自构建对应架构,避免 universal 包对 native module(better-sqlite3) 的二进制冲突
        os: [windows-latest, macos-15-intel, macos-latest, ubuntu-latest]

    steps:
      - name: Check out git repository
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          # 【优化 1】启用 actions/setup-node 内置的 yarn 缓存
          # 它会根据 yarn.lock 自动管理 node_modules 的缓存
          cache: 'yarn'

      - name: Cache Electron Binaries
        # 【优化 2】缓存 Electron 预编译二进制文件
        # Electron 首次打包会下载很大的压缩包，缓存后下次构建可秒速跳过下载阶段
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-v1-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-v1-

      - name: Install Dependencies
        # 必须保留安装步骤，但由于有了上面的缓存，这一步会执行得非常快
        shell: bash
        run: |
          npm i -g yarn

          # Temporary fix for Windows: mock npx to bypass "only-allow pnpm" script failure
          if [ "${{ runner.os }}" == "Windows" ]; then
            mkdir -p .fake-bin
            echo '@echo off' > .fake-bin/npx.cmd
            echo 'echo "Fake npx called"' >> .fake-bin/npx.cmd
            export PATH="$PWD/.fake-bin:$PATH"
          fi

          yarn install --frozen-lockfile

      - name: Build Electron App for windows
        if: matrix.os == 'windows-latest'
        run: yarn run build:win

      - name: Build Electron App for macOS Intel (x64)
        if: matrix.os == 'macos-15-intel'
        shell: bash
        env:
          # macOS 代码签名 + 公证(Apple notarization)所需环境变量
          # CSC_LINK / CSC_KEY_PASSWORD 由 electron-builder 用于导入 Developer ID Application 证书
          # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID 由 notarytool 用于提交公证
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # CI 直连 GitHub 拉 electron-builder-binaries 更稳;npmmirror 未必同步 dmg-builder 新版二进制
          sed -i.bak '/electron_builder_binaries_mirror/d' .npmrc || true
          yarn run build:mac:intel
          # 重命名 mac yml,避免 arm64 那台 runner 后上传时覆盖 (后续 update-server 会自动合并)
          if [ -f dist/latest-mac.yml ]; then mv dist/latest-mac.yml dist/latest-mac-x64.yml; fi

      - name: Build Electron App for macOS Apple Silicon (arm64)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i.bak '/electron_builder_binaries_mirror/d' .npmrc || true
          yarn run build:mac:arm64
          if [ -f dist/latest-mac.yml ]; then mv dist/latest-mac.yml dist/latest-mac-arm64.yml; fi

      - name: Build Electron App for linux
        if: matrix.os == 'ubuntu-latest'
        run: yarn run build:linux

      - name: Cleanup Artifacts for Windows
        if: matrix.os == 'windows-latest'
        run: |
          npx del-cli "dist/*" "!dist/*.exe" "!dist/*.zip" "!dist/*.yml" "!dist/*.blockmap"

      - name: Cleanup Artifacts for MacOS
        if: startsWith(matrix.os, 'macos')
        run: |
          npx del-cli "dist/*" "!dist/(*.dmg|*.zip|*.blockmap|latest*.yml)"

      - name: Cleanup Artifacts for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          npx del-cli "dist/*" "!dist/(*.AppImage|*.deb|*.snap|*.blockmap|latest*.yml)"

      - name: Upload Artifacts
        # 将构建产物上传到 GitHub Actions 任务面板，方便在 Release 发布前检查包体
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os }}-build-artifacts
          path: dist

      - name: Extract changelog section
        # 从 CHANGELOG.md 中抽取当前 tag 对应的版本块作为 Release body
        # 取从第一个 "## [vX.Y.Z]" 到下一个 "## [" 之间的内容 (不含下一个标题)
        # 若 CHANGELOG.md 不存在 / 抽取失败,回退到 commit message
        # 注意: 所有平台都跑这一步 —— windows/macOS runner 都内置 bash,
        # 这样每个矩阵节点都有同一份 release-notes.md,Release 步骤无需区分平台
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        shell: bash
        run: |
          set -e
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          NOTES_FILE="release-notes.md"
          if [ -f CHANGELOG.md ]; then
            awk -v tag="$TAG_NAME" '
              BEGIN { in_block = 0 }
              /^## \[/ {
                if (in_block) { exit }
                if (index($0, "[" tag "]") > 0) { in_block = 1; next }
              }
              in_block { print }
            ' CHANGELOG.md > "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "⚠️  未能从 CHANGELOG.md 提取到 $TAG_NAME 的内容,回退到 commit message"
            git log -1 --pretty=%B > "$NOTES_FILE"
          fi
          echo "----- Release body preview -----"
          head -n 40 "$NOTES_FILE"
          echo "--------------------------------"

      - name: Release
        # 只有在推送 Tag (v*) 时才触发真正的 GitHub Release 发布
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: 'dist/**'
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

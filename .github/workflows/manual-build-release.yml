name: Manual Build & Upload To Release

# 手动触发：构建全平台并上传到指定 Release（默认最新 Release）
# 适用场景：
#   - main.yml 因 tag 推送时部分平台失败，需要重跑某个平台并补传产物
#   - 已手动创建 Release（未触发 tag workflow），需要补构建上传
#   - 已发布的 Release 想替换某个产物（gh release upload --clobber 会覆盖同名文件）

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '目标 Release tag（留空 = 上传到最新 Release）'
        required: false
        default: ''
      platforms:
        description: '构建哪些平台（逗号分隔：win,mac-intel,mac-arm64,linux；留空 = 全部）'
        required: false
        default: ''

jobs:
  build-and-upload:
    name: build & upload (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-15-intel, macos-latest, ubuntu-latest]

    steps:
      - name: Skip if not in selected platforms
        id: gate
        shell: bash
        run: |
          PLATFORMS="${{ github.event.inputs.platforms }}"
          OS="${{ matrix.os }}"

          # 把 runner 名映射成简短 key
          case "$OS" in
            windows-latest) KEY="win" ;;
            macos-15-intel) KEY="mac-intel" ;;
            macos-latest)   KEY="mac-arm64" ;;
            ubuntu-latest)  KEY="linux" ;;
          esac

          if [ -z "$PLATFORMS" ] || [[ ",$PLATFORMS," == *",$KEY,"* ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "本平台 ($KEY) 将参与构建"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "本平台 ($KEY) 不在 inputs.platforms ($PLATFORMS) 中，跳过"
          fi

      - name: Check out git repository
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v5

      - name: Resolve target release tag
        if: steps.gate.outputs.run == 'true'
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"

          if [ -n "$INPUT_TAG" ]; then
            TAG_NAME="$INPUT_TAG"
            # 校验 tag 对应的 release 存在
            if ! gh api "repos/${{ github.repository }}/releases/tags/$TAG_NAME" > /dev/null 2>&1; then
              echo "::error::Release tag '$TAG_NAME' 不存在"
              exit 1
            fi
          else
            TAG_NAME="$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')"
            if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "null" ]; then
              echo "::error::未找到可上传的最新 Release，请手动指定 tag"
              exit 1
            fi
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "目标 Release: $TAG_NAME"

      - name: Install Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'yarn'

      - name: Cache Electron Binaries
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-v1-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-v1-

      - name: Install Dependencies
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          npm i -g yarn

          if [ "${{ runner.os }}" == "Windows" ]; then
            mkdir -p .fake-bin
            echo '@echo off' > .fake-bin/npx.cmd
            echo 'echo "Fake npx called"' >> .fake-bin/npx.cmd
            export PATH="$PWD/.fake-bin:$PATH"
          fi

          yarn install --frozen-lockfile

      - name: Build Electron App for Windows
        if: steps.gate.outputs.run == 'true' && matrix.os == 'windows-latest'
        run: yarn run build:win

      - name: Build Electron App for macOS Intel (x64)
        if: steps.gate.outputs.run == 'true' && matrix.os == 'macos-15-intel'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i.bak '/electron_builder_binaries_mirror/d' .npmrc || true
          yarn run build:mac:intel

      - name: Build Electron App for macOS Apple Silicon (arm64)
        if: steps.gate.outputs.run == 'true' && matrix.os == 'macos-latest'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i.bak '/electron_builder_binaries_mirror/d' .npmrc || true
          yarn run build:mac:arm64

      - name: Build Electron App for Linux
        if: steps.gate.outputs.run == 'true' && matrix.os == 'ubuntu-latest'
        run: yarn run build:linux

      - name: Cleanup Artifacts for Windows
        if: steps.gate.outputs.run == 'true' && matrix.os == 'windows-latest'
        run: |
          npx del-cli "dist/*" "!dist/*.exe" "!dist/*.zip" "!dist/*.yml" "!dist/*.blockmap"

      - name: Cleanup Artifacts for MacOS
        if: steps.gate.outputs.run == 'true' && startsWith(matrix.os, 'macos')
        run: |
          npx del-cli "dist/*" "!dist/(*.dmg|*.zip|*.blockmap|latest*.yml)"

      - name: Cleanup Artifacts for Linux
        if: steps.gate.outputs.run == 'true' && matrix.os == 'ubuntu-latest'
        run: |
          npx del-cli "dist/*" "!dist/(*.AppImage|*.deb|*.snap|*.blockmap|latest*.yml)"

      - name: Upload build outputs to release
        if: steps.gate.outputs.run == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          shopt -s nullglob
          files=(dist/*)

          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::dist 目录没有可上传文件"
            exit 1
          fi

          echo "准备上传到 Release: $TAG_NAME"
          printf ' - %s\n' "${files[@]}"
          gh release upload "$TAG_NAME" "${files[@]}" --clobber --repo "${{ github.repository }}"
